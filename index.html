<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Camisetas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Loja de Camisetas</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Produtos</a>
            <a href="#">Contato</a>
            <span id="cart">Carrinho: 0</span>
        </nav>
    </header>

    <main>
        <section class="products">
            <div class="product" data-name="Camiseta Azul" data-price="49.90">
                <img src="https://via.placeholder.com/150/0000FF/FFFFFF?text=Azul" alt="Camiseta Azul">
                <h2>Camiseta Azul</h2>
                <p>R$ 49,90</p>
                <button class="add-to-cart">Adicionar ao Carrinho</button>
            </div>

            <div class="product" data-name="Camiseta Vermelha" data-price="59.90">
                <img src="https://via.placeholder.com/150/FF0000/FFFFFF?text=Vermelha" alt="Camiseta Vermelha">
                <h2>Camiseta Vermelha</h2>
                <p>R$ 59,90</p>
                <button class="add-to-cart">Adicionar ao Carrinho</button>
            </div>

            <div class="product" data-name="Camiseta Verde" data-price="39.90">
                <img src="https://via.placeholder.com/150/00FF00/FFFFFF?text=Verde" alt="Camiseta Verde">
                <h2>Camiseta Verde</h2>
                <p>R$ 39,90</p>
                <button class="add-to-cart">Adicionar ao Carrinho</button>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Loja de Camisetas</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
