<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Tênis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Loja de Tênis</h1>
        <div id="carrinho">
            Carrinho: <span id="total-itens">0</span> itens
        </div>
    </header>

    <main>
        <section class="produtos">
            <div class="produto">
                <img src="https://via.placeholder.com/150" alt="Tênis 1">
                <h2>Tênis Esportivo</h2>
                <p>R$ 250,00</p>
                <button onclick="adicionarAoCarrinho('Tênis Esportivo', 250)">Adicionar ao Carrinho</button>
            </div>
            <div class="produto">
                <img src="https://via.placeholder.com/150" alt="Tênis 2">
                <h2>Tênis Casual</h2>
                <p>R$ 180,00</p>
                <button onclick="adicionarAoCarrinho('Tênis Casual', 180)">Adicionar ao Carrinho</button>
            </div>
            <div class="produto">
                <img src="https://via.placeholder.com/150" alt="Tênis 3">
                <h2>Tênis Fashion</h2>
                <p>R$ 300,00</p>
                <button onclick="adicionarAoCarrinho('Tênis Fashion', 300)">Adicionar ao Carrinho</button>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Loja de Tênis. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
